name: Build Spicy EX APK

# Private checkpoint pushes are validated locally and on-device.
# Keep this workflow manual-only so GitHub Actions does not spend minutes or artifact quota.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/spicyex-release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed Release APKs
        env:
          SIGNING_KEYSTORE_FILE: ${{ github.workspace }}/spicyex-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleLiteRelease assembleFullRelease

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: spicy-ex-release-apks
          path: |
            app/build/outputs/apk/lite/release/*.apk
            app/build/outputs/apk/full/release/*.apk
